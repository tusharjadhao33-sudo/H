<script>
const messages = document.getElementById("messages");

/* MEMORY */
let brain = JSON.parse(localStorage.getItem("brain")) || {};
let learnMode = false;
let lastQ = "";
let name = localStorage.getItem("name") || "";

/* BIG DATASET (expandable easily) */
const knowledge = [
  {keys:["html","web"], ans:"HTML builds the structure of web pages."},
  {keys:["css","design"], ans:"CSS is used for styling websites."},
  {keys:["javascript","js"], ans:"JavaScript adds interactivity to websites."},
  {keys:["ai","artificial intelligence"], ans:"AI is the simulation of human intelligence in machines."},
  {keys:["earth","planet"], ans:"Earth is the third planet from the Sun."},
  {keys:["sun","star"], ans:"The Sun is a star providing energy to Earth."},
  {keys:["moon"], ans:"The Moon orbits Earth and affects tides."},
  {keys:["computer"], ans:"A computer processes data using instructions."},
  {keys:["internet"], ans:"The internet is a global network of computers."},
  {keys:["python"], ans:"Python is a popular programming language."},
  {keys:["java"], ans:"Java is used for apps and enterprise software."},
  {keys:["c++"], ans:"C++ is used for system programming."},
  {keys:["health"], ans:"Health depends on diet, sleep, and exercise."},
  {keys:["money"], ans:"Manage money by saving and investing."},
  {keys:["success"], ans:"Success comes from consistency and effort."},
  {keys:["study"], ans:"Study using focus sessions and revision."},
  {keys:["love"], ans:"Love is a strong emotional bond ❤️"},
  {keys:["sad"], ans:"Tough times pass. Stay strong 💪"},
  {keys:["motivation"], ans:"Discipline is stronger than motivation 🔥"}
];

/* SEARCH ENGINE (mini google) */
function searchBestMatch(text) {
  let words = text.split(" ");
  let bestScore = 0;
  let bestAnswer = null;

  for (let item of knowledge) {
    let score = 0;

    for (let key of item.keys) {
      if (text.includes(key)) score += 2;
      if (words.includes(key)) score += 1;
    }

    if (score > bestScore) {
      bestScore = score;
      bestAnswer = item.ans;
    }
  }

  return bestScore > 0 ? bestAnswer : null;
}

/* MATH */
function solveMath(text) {
  try {
    return "🧮 " + Function("return " + text)();
  } catch {
    return null;
  }
}

/* SHOW MESSAGE */
function add(text, type) {
  let d = document.createElement("div");
  d.className = type;
  d.innerText = text;
  messages.appendChild(d);
  messages.scrollTop = messages.scrollHeight;
}

/* MAIN BRAIN */
function reply(input) {
  let t = input.toLowerCase().trim();

  // LEARNING
  if (learnMode) {
    brain[lastQ] = input;
    localStorage.setItem("brain", JSON.stringify(brain));
    learnMode = false;
    return "🔥 Learned! I’ll remember that.";
  }

  // MEMORY
  if (brain[t]) return brain[t];

  // NAME
  if (t.includes("my name is")) {
    name = t.split("is")[1]?.trim();
    localStorage.setItem("name", name);
    return "Nice to meet you " + name + " 😎";
  }

  // GREETING
  if (/hi|hello|hey/.test(t))
    return "Hey " + (name || "buddy") + "! Ask me anything ⚡";

  // TIME
  if (t.includes("time")) return new Date().toLocaleTimeString();
  if (t.includes("date")) return new Date().toDateString();

  // MATH
  if (/^[0-9+\-*/(). ]+$/.test(t)) {
    let m = solveMath(t);
    if (m) return m;
  }

  // CODING
  if (t.includes("html")) return "<html><body>Hello</body></html>";
  if (t.includes("css")) return "body { background:black; }";
  if (t.includes("javascript")) return "console.log('Hello');";

  // SEARCH KNOWLEDGE
  let result = searchBestMatch(t);
  if (result) return result;

  // FALLBACK
  const fallback = [
    "Hmm 🤔 I need more detail",
    "Can you explain better?",
    "Interesting question 😏",
    "I’m still learning... teach me!"
  ];

  learnMode = true;
  lastQ = t;

  return fallback[Math.floor(Math.random()*fallback.length)];
}

/* SEND */
function send() {
  let input = document.getElementById("userInput");
  let text = input.value.trim();
  if (!text) return;

  add(text, "user");

  setTimeout(() => {
    add(reply(text), "bot");
  }, 300);

  input.value = "";
}
</script>
